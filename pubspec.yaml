name: vm_app
description: "VMeste App Flutter client"
publish_to: 'none'
version: 0.1.0

environment:
  flutter: ^3.41.0
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Core
  async: any
  collection: any
  meta: any
  stack_trace: any

  # State management
  control: ^0.2.0

  # Networking
  dio: ^5.9.0

  yandex_maps_mapkit_lite: 4.30.0-beta
  image_picker: ^1.2.1
  
  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any # Use the pinned version from flutter_localizations

  # Storage
  shared_preferences: ^2.5.3

  # Logger
  l: ^5.0.1

  flutter_skill: ^0.9.36

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files
  generate: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
          weight: 400
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          weight: 400
          style: italic

  shaders:
    - lib/src/core/ui-kit/shimmer/shimmer.frag